version: '3.8'

services:
  honeysap:
    build:
      context: .
      dockerfile: deployment/Dockerfile
    image: honeysap:latest
    restart: unless-stopped
    ports:
      - "3299:3299"   # SAP Router
      - "3200:3200"   # SAP Dispatcher (Diag/SAP GUI)
      - "3300:3300"   # SAP Gateway (RFC)
      - "8000:8000"   # SAP ICM (HTTP)
      - "3600:3600"   # SAP Message Server (TCP)
      - "8100:8100"   # SAP Message Server (HTTP)
    volumes:
      # Persist logs outside the container
      - ./logs:/opt/honeysap/logs
      # Mount catalog CSVs from the host data/ directory (read-only)
      - ./data:/opt/honeysap/data:ro
    command:
      - honeysap
      - --config-file
      - profiles/internal.yml
