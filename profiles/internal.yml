# HoneSAP default internal profile configuration
# ==============================================

# Console logging configuration
# -----------------------------

# Level of console logging
verbose: 2

# Use colored output
colored_console: true


# Miscellaneous configuration
# ---------------------------

# Enable reloading after a change in one of the configuration files
reload: false

# Address to listen for all services
listener_address: 0.0.0.0


# SAP instance configuration
# --------------------------

# Release version
release: "720"


# Services configuration
# ----------------------

services:
    -
        # SAP Dispatcher service
        # ----------------------
        service: SAPDispatcherService
        alias: ExternalDispatcherService
        enabled: yes
        listener_port: 3200

        # Name of the instance
        instance: NSP
        
        # Client number
        client_no: "001"
        
        # SID
        sid: PRD
        
        # Hostname
        hostname: sapnw702

    -
        # SAP Gateway service
        # -------------------
        service: SAPGatewayService
        alias: GatewayService
        enabled: yes
        listener_port: 3300
        listener_address: 0.0.0.0
        hostname: sapnw702
        sid: PRD
        instance_number: "00"

        # Optional: path to a semicolon-delimited RFM catalog CSV (exported
        # from SAP with columns FUNCNAME;REMOTE_CALL;UPDATE_TASK;...PARAMTEXT).
        # When set, the gateway will serve RFC_GET_FUNCTION_INTERFACE responses
        # for any function module present in the catalog.
        rfm_catalog: data/honeysap_rfm.csv
        # Optional: path to the DDIC structure field definitions CSV (exported
        # from SAP alongside the RFM catalog).  Used for DDIF_FIELDINFO_GET
        # type lookups.
        ddic_catalog: data/honeysap_ddic.csv

    -
        # SAP ICM (HTTP) service
        # ----------------------
        service: SAPICMService
        alias: ICMService
        enabled: yes
        listener_port: 8000
        release: "720"
        hostname: sapnw702

    -
        # SAP Message Server (TCP) service
        # --------------------------------
        service: SAPMSService
        alias: MessageServerService
        enabled: yes
        listener_port: 3600

    -
        # SAP Message Server (HTTP) service
        # ---------------------------------
        service: SAPMSHTTPService
        alias: MessageServerHTTPService
        enabled: yes
        listener_port: 8100
        release: 720
        instance: PRD
        hostname: sapnw702


# Feeds configuration
# -------------------

feeds:
    -
        feed: LogFeed
        log_filename: honeysap-internal.log
        enabled: yes
    -
        feed: ConsoleFeed
        enabled: yes
    -
        feed: HPFeed
        channels:
            - honeysap.events
        feed_host: 10.250.250.20
        feed_port: 20000
        feed_ident: honeysap
        feed_secret: password
        enabled: no
